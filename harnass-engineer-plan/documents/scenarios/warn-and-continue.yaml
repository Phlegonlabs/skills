id: warn-and-continue
description: "Scaffold version is incompatible — warn the user and continue into research-and-plan"
steps:
  - id: read-version
    action: "Read .harnass-version.yaml from the target repo scaffold"
    tool: Read
    targets:
      - harnass-os/documents/.harnass-version.yaml
    output: "scaffold spec_version string"

  - id: compare-versions
    action: "Compare scaffold spec_version against plan skill's expected range"
    logic: |
      Parse spec_version from .harnass-version.yaml.
      If spec_version < min_compatible: warn user that scaffold is older than expected.
      If spec_version > max_compatible: warn user that scaffold is newer than expected.
      In both cases, continue — do not block.
    output: "version comparison result and warning message"

  - id: warn-user
    action: "Display a visible warning in chat about the version mismatch"
    tool: AskUserQuestion
    message: |
      WARNING: Scaffold version mismatch detected.
      Detected scaffold spec_version: <detected_version>
      Expected compatible range: <min_compatible> to <max_compatible>

      Planning will continue, but some features may not align with this scaffold version.
      If you experience issues, re-run harnass-engineer-start to update the scaffold.
    question: "Acknowledge and continue? (reply 'continue' or 'stop')"
    on_stop: "halt planning and direct user to run harnass-engineer-start"

  - id: continue-to-plan
    action: "Proceed into the research-and-plan scenario"
    next_scenario: research-and-plan

gates:
  - version-file-must-exist
emit:
  - warning-acknowledged
