id: research-and-plan
planning_visibility:
  directive: behavioral
  rule: "Announce the current phase and step name before executing each step. This is informational — it does not gate execution."
  format: "[Phase N] step-id — action summary"
steps:
  # ── Phase 0: Version handshake ─────────────────────────────────────────
  - id: check-scaffold-version
    action: "Read .harnass-version.yaml and verify scaffold compatibility"
    tool: Read
    targets:
      - harnass-os/documents/.harnass-version.yaml
    output: "scaffold version compatibility status"
    verify: "scaffold_spec_version >= min_compatible_plan_version, or warn if file missing"
    on_missing: "warn: .harnass-version.yaml not found — repo may predate version handshake. Continuing."

  # ── Phase 1: Research existing repo ────────────────────────────────────
  - id: read-scaffold-state
    action: "Read scaffold state to confirm bootstrap is complete"
    tool: Read
    targets:
      - harnass-os/documents/routes/router.yaml
      - harnass-os/documents/routes/load-order.yaml
      - harnass-os/documents/validation/profiles.yaml
    output: "understanding of available scaffold and validation profiles"
    verify: "scaffold files exist and are not empty"

  - id: scan-repo-and-docs
    action: "Research existing project structure — frameworks, package manager, commands, entry points, styling"
    tool: Read
    read_files:
      - file: package.json
        extract: [name, scripts.dev, scripts.build, scripts.test, scripts.lint, dependencies, devDependencies]
      - file: tsconfig.json
        extract: [compilerOptions.strict, compilerOptions.target, compilerOptions.paths, include]
      - file: wrangler.toml
        extract: [name, main, pages_build_output_dir, compatibility_date, vars, kv_namespaces, d1_databases, r2_buckets]
      - file: .env.example
        extract: [all variable names]
      - file: Cargo.toml
        extract: [package.name, dependencies]
      - file: go.mod
        extract: [module, require]
      - file: pyproject.toml
        extract: [project.name, project.dependencies]
      - file: requirements.txt
        extract: [all package names]
    scan_directories:
      - path: src/
        purpose: "identify entry points, page routes, API routes, component structure"
        tool: Bash
        command: "rg --files src | Select-Object -First 50"
      - path: app/
        purpose: "identify Next.js/Remix app directory routes"
        tool: Bash
        command: "rg --files app | Select-Object -First 30"
      - path: pages/
        purpose: "identify Next.js pages directory routes"
        tool: Bash
        command: "rg --files pages | Select-Object -First 30"
      - path: cmd/
        purpose: "identify Go CLI or server entry points"
        tool: Bash
        command: "rg --files cmd | Select-Object -First 20"
    output: "research findings — what exists, what stack, what patterns"
    verify: "agent has a clear picture of the repo or confirms it is empty (greenfield)"

  - id: scan-frontend-backend-design-data-infra
    action: "Deep-scan each layer to understand architecture and design patterns"
    tool: Read
    targets:
      - "src/components/ (if exists) — component naming patterns, shared vs page-specific"
      - "src/api/ or src/server/ (if exists) — API route patterns, middleware, auth"
      - "src/lib/ or src/utils/ (if exists) — shared utilities, DB clients, API clients"
      - "tailwind.config.* or postcss.config.* (if exists) — styling configuration"
      - "src/styles/ or src/css/ (if exists) — CSS/SCSS patterns"
    output: "understanding of frontend patterns, backend patterns, design/styling patterns, data access patterns"
    verify: "agent can describe the architecture in 2-3 sentences or confirms greenfield"

  - id: capture-entrypoints-and-project-commands
    action: "Extract concrete commands, package manager, and entry point files"
    tool: Bash
    commands:
      - "python -c \"import json, pathlib; p=pathlib.Path('package.json'); print('no package.json' if not p.is_file() else '\\n'.join(f'{k}: {v}' for k,v in json.loads(p.read_text()).get('scripts',{}).items()))\""
      - "python -c \"import pathlib; locks=['package-lock.json','pnpm-lock.yaml','yarn.lock','bun.lockb']; found=[name for name in locks if pathlib.Path(name).is_file()]; print('\\n'.join(found) if found else 'no lock file')\""
    output:
      - "dev_command, build_command, test_command, lint_command, typecheck_command"
      - "package_manager: npm (package-lock.json), pnpm (pnpm-lock.yaml), yarn (yarn.lock), bun (bun.lockb), or unknown"
      - "list of entry point files"
    verify: "package manager identified or marked unknown; commands discovered or marked unknown"

  # ── Phase 2: Ask user — intake + preferences ──────────────────────────
  - id: capture-intake
    action: "Ask user for project name, idea, and what they want to build"
    tool: AskUserQuestion
    questions:
      - key: project_name
        prompt: "What is the project name?"
        required: true
      - key: user_goal
        prompt: "What do you want to build or change? (one sentence)"
        required: true
      - key: project_idea
        prompt: "Describe the project idea in more detail."
        required: true
      - key: constraints
        prompt: "Any technical or process constraints?"
        required: false
      - key: requested_changes
        prompt: "What specific changes or features do you want?"
        required: false
    then:
      tool: Edit
      target: harnass-os/documents/intake/request.yaml
      fill:
        request_id: "auto-generated from project_name — lowercase, hyphens, no spaces"
        user_goal: "from user answer"
        project_name: "from user answer"
        project_idea: "from user answer"
        constraints: "from user answer or empty list"
        requested_changes: "from user answer or empty list"
    verify: "harnass-os/documents/intake/request.yaml has request_id, user_goal, project_name, project_idea, constraints, and requested_changes populated"

  - id: classify-initial-horizon
    action: "Classify the initial task horizon from intake signals to determine question depth"
    logic: |
      Read intake signals (user_goal complexity, requested_changes count, constraints).
      If signals match single_task rules (one focused ask, narrow write surface): initial_horizon = single_task
      If signals match long_run rules (greenfield, multi-surface, open-ended): initial_horizon = long_run
      This classification is preliminary — it can be upgraded during plan review.
    output: "initial_horizon value used to select question_depth strategy"
    then:
      tool: Edit
      target: harnass-os/documents/intake/request.yaml
      fill:
        initial_horizon: "from classification result — single_task or long_run"
        signals: "from intake signal analysis — e.g. repo_bootstrap, narrow_change, greenfield, multi_surface"
    depth_selection:
      single_task: "use minimum-unblocking-set-only — 1 to 3 rounds of questions"
      long_run: "use fixed-intake-then-deep-dive — 3 fixed rounds + up to 7 deep-dive rounds"
    verify: "initial_horizon is set to single_task or long_run"

  - id: ask-app-type-and-preferences
    action: "Ask user for app type, stack preferences, and design direction based on research findings"
    tool: AskUserQuestion
    questions:
      - key: app_type
        prompt: "What type of application is this?"
        required: true
        options: [web, cli, mobile-ios, mobile-android, desktop, api-only]
      - key: frontend_framework
        prompt: "Frontend framework preference? (based on research: list what was found or suggest options)"
        required_when: "app_type in [web, mobile-ios, mobile-android, desktop]"
        examples: [react, vue, svelte, next, nuxt, remix, astro, hono, solid, none]
      - key: backend_framework
        prompt: "Backend framework preference?"
        required_when: "app_type != cli"
        examples: [hono, express, fastify, flask, django, gin, axum, none]
      - key: package_manager
        prompt: "Package manager preference? (detected from lock file if exists)"
        required_when: "stack uses node"
        options: [npm, pnpm, yarn, bun]
      - key: styling_approach
        prompt: "Styling approach preference?"
        required_when: "app_type in [web, mobile-ios, mobile-android, desktop]"
        examples: [tailwind, css-modules, inline-css, styled-components, scss, none]
      - key: runtime_target
        prompt: "Where will this run?"
        required: true
        examples: [cloudflare-workers, cloudflare-pages, vercel, node, deno, browser-only, local-cli]
    output: "user preferences captured — app type, frameworks, package manager, styling, runtime"
    then:
      tool: Edit
      target: harnass-os/documents/intake/request.yaml
      fill:
        app_type: "from user answer — web, cli, mobile-ios, mobile-android, desktop, api-only"
    verify: "app_type is set; framework and styling preferences are captured for UI apps"

  - id: ask-product-and-scope-adaptive
    action: "Ask user about scope, key features, and constraints — depth adapts to initial_horizon"
    tool: AskUserQuestion
    adaptive_depth:
      source: "initial_horizon from classify-initial-horizon step"
      single_task:
        strategy: minimum-unblocking-set-only
        max_rounds: 3
        focus: "only ask what is needed to unblock the single task"
      long_run:
        strategy: fixed-intake-then-deep-dive
        fixed_rounds: 3
        deep_dive_rounds: 7
        fixed_questions:
          - "What is the first capability you want working? (ship-first-capability)"
          - "What is explicitly out of scope for v1? (out-of-scope-v1)"
          - "What is the milestone order you envision? (milestone-order)"
        deep_dive_from: "question-set.yaml groups, filtered by app_type and research findings"
    questions_from: "question-set.yaml groups, filtered by app_type and research findings"
    include_always:
      - "What is the first capability you want working? (ship-first-capability)"
      - "What is explicitly out of scope for v1? (out-of-scope-v1)"
    include_when_ui:
      - "What are the key user flows? (browser-validated-flows)"
      - "Any design system or styling non-negotiables? (design-system-non-negotiables)"
    include_when_deployment:
      - "Preview domain or environment? (preview-domain)"
      - "Who approves releases? (release-approval-owner)"
    output: "user decisions on scope, features, constraints, and rollout"
    verify: "ship-first-capability and out-of-scope-v1 answered"

  - id: web-search-market-stacks
    action: "Search the web for current market status of detected frameworks and tools to validate tech stack choices"
    tool: WebSearch
    queries_from: "detected stack from Phase 1 scan + user-confirmed app_type, frontend framework, backend framework, runtime target from Phase 2"
    example_queries:
      - "${framework} production readiness 2025"
      - "${framework} vs alternatives for ${app_type}"
      - "${runtime_target} deployment best practices"
    output:
      target: "harnass-os/documents/inventory/current-state.yaml market_context section"
      fields:
        search_performed: true
        search_queries: "list of queries executed"
        findings: "key insights — e.g. 'React 19 stable, recommended for new projects'"
        recommended_stack_changes: "any suggestions based on findings (empty if stack is current)"
        status: search-complete
    fallback:
      condition: "web search unavailable or offline"
      output:
        search_performed: false
        status: search-skipped-offline
    verify: "market_context.status is search-complete or search-skipped-offline"

  # ── Phase 3: Write inventory with research + user answers ─────────────
  - id: write-current-state
    action: "Fill harnass-os/documents/inventory/current-state.yaml with research findings and user preferences"
    tool: Edit
    target: harnass-os/documents/inventory/current-state.yaml
    fill_from:
      repo_shape.summary: "from scan — e.g. 'Greenfield Hono app on Cloudflare Workers' or 'Existing Next.js 14 app with App Router'"
      ui_facing: "true if app_type in [web, mobile-ios, mobile-android, desktop], false if cli or api-only"
      app_type: "from user answer — web, cli, mobile-ios, mobile-android, desktop, api-only"
      frontend.frameworks: "from user preference or detected from package.json dependencies"
      frontend.package_manager: "from user preference or detected from lock file"
      frontend.dev_command: "from package.json scripts.dev or user preference"
      frontend.build_command: "from package.json scripts.build or user preference"
      frontend.test_command: "from package.json scripts.test or user preference"
      frontend.lint_command: "from package.json scripts.lint or equivalent"
      frontend.typecheck_command: "from package.json scripts.typecheck or equivalent"
      frontend.app_entrypoints: "from src/app/page.tsx or src/main.tsx or equivalent"
      backend.services: "from API routes or server files discovered"
      backend.api_style: "from route patterns or user framework choice"
      backend.runtime: "from user runtime_target preference"
      backend.lint_command: "from backend lint script or equivalent when backend is separate"
      backend.typecheck_command: "from backend typecheck command or equivalent when backend is separate"
      design_system.styling_model: "from user styling_approach preference"
      runtime.config_source: "wrangler.toml if cloudflare, vercel.json if vercel, etc."
      runtime.bindings_model: "from wrangler.toml bindings or user answer"
      runtime.provider: "from user runtime_target preference — cloudflare, vercel, node, deno, etc."
      deployment.provider: "from user runtime_target preference — same as runtime.provider or derived from deployment surface"
      deployment.surfaces: "from user runtime_target preference"
      deployment.preview_command: "constructed from runtime target"
      deployment.production_command: "constructed from runtime target"
      deployment.preview_url: "preview environment URL if known"
      deployment.production_url: "production environment URL if known"
      testing.dev_port: "local dev port used for smoke checks"
      testing.ui_test_path: "primary route path for browser and curl smoke"
      testing.integration_flows: "structured browser/API audit flow objects with flow_id, path, mode, steps, expected_requests, and pass_when"
      testing.post_deploy_smoke_paths: "paths that must return healthy after deploy"
      testing.audit_account_ref: "required when any integration flow uses mode=stateful"
    verify: "all required fields populated or explicitly marked 'unknown' — no <fill> remains for discovered values"

  - id: block-when-frontend-design-unavailable
    condition: "inventory.ui_facing == true AND frontend-design skill not available"
    action: "Stop planning — frontend-design is mandatory for UI-facing work"
    tool: Bash
    command: "echo 'BLOCKED: frontend-design skill is not available but is required for UI-facing planning' >&2 && exit 1"
    output: "planning halted with exit code 1"
    verify: "planning does not continue until frontend-design is available"

  - id: call-frontend-design-when-ui-facing
    condition: "inventory.ui_facing == true AND frontend-design skill available"
    action: "Invoke the frontend-design skill to generate wireframe and design docs"
    contract_ref: ./contracts/frontend-design-interface.yaml
    tool: Skill
    skill_name: frontend-design
    input:
      user_goal: "from harnass-os/documents/intake/request.yaml user_goal"
      project_context: "from harnass-os/documents/inventory/current-state.yaml"
      constraints: "from harnass-os/documents/intake/request.yaml constraints"
    output:
      - harnass-os/documents/design/wireframe.md
      - harnass-os/documents/design/design.md
    verify:
      - "harnass-os/documents/design/wireframe.md contains at least one screen/flow"
      - "harnass-os/documents/design/design.md contains component specs and styling rules"

  - id: write-plan-draft
    action: "Create the plan YAML with goal, topology, empty milestones, and empty top-level tasks"
    tool: Write
    output: "harnass-os/documents/plans/<slug>.yaml"
    slug_derivation: |
      slug = sanitize(intake.project_name)
      where sanitize:
        1. lowercase the string
        2. replace spaces, underscores, and non-alphanumeric characters with hyphens
        3. collapse consecutive hyphens to a single hyphen
        4. strip leading/trailing hyphens
      example: "My Cool Project!" → "my-cool-project"
      The plan file id field must match the slug.
    required_fields:
      - id
      - intake_ref
      - goal
      - current_state_ref
      - task_horizon
      - agent_topology
      - release_affecting
      - decision_sensitive
      - user_decisions
      - milestones
      - tasks
      - global_validation
      - completion_criteria
      - review
      - change_log
      - execution_ready
      - status
    conditional_required_fields:
      ui_facing:
        - design_validation_ref
        - wireframe_ref
        - design_ref
        - frontend_design_skill_required
      release_affecting:
        - deployment_ref
        - runtime_ref
        - release_ref
      decision_sensitive:
        - decision_refs
    initial_route_flags:
      release_affecting: false
      decision_sensitive: false
    conditional_seed_fields:
      ui_facing:
        design_validation_ref: harnass-os/documents/validation/design-review.yaml
        wireframe_ref: harnass-os/documents/design/wireframe.md
        design_ref: harnass-os/documents/design/design.md
        frontend_design_skill_required: true
    initial_status: draft
    verify: "plan file exists with all required top-level fields"

  - id: write-design-validation-when-ui-facing
    condition: "inventory.ui_facing == true AND frontend-design skill available"
    action: "Fill design validation checklist based on wireframe and design docs"
    tool: Edit
    target: harnass-os/documents/validation/design-review.yaml
    fill_from:
      review_id: "derived from plan slug or request id"
      plan_id: "from plan.id once slug is known"
      milestone_scope: "initial-plan-review"
      wireframe_ref: harnass-os/documents/design/wireframe.md
      design_ref: harnass-os/documents/design/design.md
      frontend_design_skill: frontend-design
      design_source: "frontend-design"
      scenarios: "list primary user flows from wireframe.md"
      states_checked: "list states from design.md (loading, error, empty, populated)"
      breakpoints_checked: "list breakpoints from design.md"
      findings: "design review findings or [] if none"
      decision: pending
    verify: "design-review.yaml has populated scenarios, states_checked, breakpoints_checked, and decision"

  - id: classify-agent-topology
    action: "Determine solo vs lead-worker based on task count and parallelism needs"
    logic: |
      If total tasks <= 3 and no parallel work needed: topology = solo
      If tasks > 3 or parallel tasks exist: topology = lead-worker
      If all tasks are sequential with no branching: topology = solo
    tool: "inline decision — update plan.agent_topology"
    verify: "agent_topology is set to solo or lead-worker"

  - id: build-capability-milestones
    action: "Group tasks into milestones that each deliver a testable capability"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    rules:
      - "each milestone has capability, goal, depends_on, parallel_policy, acceptance_criteria, validation_commands, done_when, failure_policy, demo_flow, exit_validation, execution_context, tasks, and status"
      - "each milestone has a goal describing the testable capability"
      - "each milestone lists its task IDs"
      - "each milestone has exit_validation referencing a validation profile"
      - "default execution_context is milestone-worktree with worktree_ref ../milestone-<id> and branch_ref milestone/<id>"
      - "milestones are ordered by dependency (earlier milestones first)"
    verify: "at least one milestone exists and every milestone satisfies milestone-schema.yaml"

  - id: attach-milestone-gates
    action: "Assign gate conditions to each milestone"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    rules:
      - "milestone gate: all-tasks-committed-and-validated"
      - "milestone exit_validation: references a profile from validation/profiles.yaml"
    verify: "every milestone has a gate and exit_validation"

  - id: build-atomic-tasks
    action: "Define atomic tasks in top-level plan.tasks and reference them from milestones"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    required_per_task:
      - "tasks live in top-level plan.tasks; milestones[*].tasks contains only task IDs"
      - "id: unique task identifier (e.g. t1-descriptive-name)"
      - "goal: one-sentence description of what the task accomplishes"
      - "depends_on: list of task IDs this depends on ([] if none)"
      - "read_scope: list of files/directories the task needs to read"
      - "write_scope: list of files the task will create or modify"
      - "entrypoints: list of files to read FIRST with reason (e.g. 'src/api/ — read existing API patterns')"
      - "agent_role: solo or worker"
      - "worktree_required: true/false (used only for non-milestone exceptions; default milestone execution is shared milestone-worktree)"
      - "implementation_strategy: rewrite-by-replacement"
      - "implementation_steps: list of step objects with {step, action, tool, output/target/command}"
      - "rewrite_policy: replacement-first"
      - "validation_profile: profile name from validation/profiles.yaml"
      - "validation_commands: list of actual shell commands to run"
      - "artifacts_updated: list of files changed"
      - "done_definition: one sentence describing when this task is done"
      - "commit_required: true"
      - "handoff_output: harnass-os/documents/handoffs/<task-id>.yaml"
      - "status: pending"
    conditional_per_task:
      ui_facing:
        - "wireframe_ref: harnass-os/documents/design/wireframe.md"
        - "design_ref: harnass-os/documents/design/design.md"
      release_affecting:
        - "runtime_ref: harnass-os/documents/runtime/<provider>.yaml"
        - "release_ref: harnass-os/documents/release/current.yaml"
        - "deploy_commands_ref: harnass-os/documents/deploy/current.yaml"
        - "rollback_note: reference the rollback path from deploy/current.yaml"
      decision_sensitive:
        - "decision_refs: list of ADR or decision index refs covering this task"
    verify:
      - "every task has all required fields populated in plan.tasks"
      - "no write_scope overlaps between tasks in the same milestone"
      - "depends_on references exist and form no cycles"
      - "validation_commands are actual shell commands, not <fill>, and do not retain unresolved ${...} tokens"
      - "implementation_steps have concrete action/tool/output"
      - "entrypoints list specific files with read-reason"
      - "integration_flows, when present, are structured objects rather than free text"
      - "every milestone.tasks entry references an existing task id"

  - id: record-decisions-when-required
    condition: "user_decisions contain significant architectural choices"
    action: "Record decisions in ADR format"
    tool: Edit
    targets:
      - "harnass-os/documents/decisions/index.yaml"
      - "harnass-os/documents/plans/<slug>.yaml"
    updates:
      - "harnass-os/documents/decisions/index.yaml: add entries for each durable decision"
      - "harnass-os/documents/plans/<slug>.yaml decision_sensitive: true"
      - "harnass-os/documents/plans/<slug>.yaml decision_refs: list of ADR or decision index refs"
    verify: "decision index references ADR files and the plan sets decision_sensitive and decision_refs"

  - id: attach-validation-commit-handoff
    action: "Ensure every task has validation_profile, commit_required, and handoff_output"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    verify:
      - "every task has validation_profile set to a valid profile name"
      - "every task has validation_commands with actual shell commands"
      - "every task has commit_required: true"
      - "every task has handoff_output: harnass-os/documents/handoffs/<task-id>.yaml"

  - id: attach-runtime-and-release-route-when-release-affecting
    condition: "any task affects deployment (new routes, API changes, infrastructure)"
    action: "Fill runtime and release documents"
    tool: Edit
    targets:
      - harnass-os/documents/plans/<slug>.yaml
      - harnass-os/documents/runtime/<provider>.yaml
      - harnass-os/documents/release/current.yaml
    fill_from_inventory:
      - "plan.release_affecting: true"
      - "plan.runtime_ref: harnass-os/documents/runtime/<provider>.yaml"
      - "plan.release_ref: harnass-os/documents/release/current.yaml"
      - "runtime fields from inventory.runtime"
      - "release plan_id from plan.id"
    verify: "plan.release_affecting is true, plan.runtime_ref and plan.release_ref are set, and runtime/release docs have plan references"

  - id: attach-deployment-route-when-release-affecting
    condition: "plan is release-affecting"
    action: "Fill deploy document with discovered deployment commands"
    tool: Edit
    targets:
      - harnass-os/documents/plans/<slug>.yaml
      - harnass-os/documents/deploy/current.yaml
    fill_from_inventory:
      - "plan.deployment_ref: harnass-os/documents/deploy/current.yaml"
      - "build_command from inventory.frontend.build_command or inventory.backend.build_command"
      - "preview_deploy_command from deploy template discover section"
      - "production_deploy_command from deploy template discover section"
      - "smoke_command_refs from key routes"
      - "rollback_command from deploy template discover section"
    verify: "plan.deployment_ref is set and deploy/current.yaml has no <fill> in command fields"

  - id: self-review-plan
    action: "Run self-review checklist against the plan"
    tool: Read
    target: "harnass-os/documents/plans/<slug>.yaml"
    checklist:
      - "All tasks have write_scope defined and non-overlapping within concurrent tasks"
      - "All tasks have validation_profile assigned to a real profile"
      - "All tasks have validation_commands with executable shell commands"
      - "All tasks have implementation_steps with concrete action/tool/output"
      - "All tasks have entrypoints listing files to read first with reason"
      - "All depends_on references exist and form no cycles"
      - "UI-facing tasks reference wireframe.md and design.md"
      - "Release-affecting plan has runtime, release, and deploy docs filled"
      - "Milestone exit_validation covers integration"
      - "Completion criteria are testable"
      - "No <fill> placeholders remain in task fields"
      - "UI-facing + release-affecting plans define testing.integration_flows in inventory with at least one structured flow"
    output: "review findings — blocking and non-blocking"
    verify: "blocking_findings is empty"

  - id: revise-plan-and-change-log
    action: "Fix any blocking findings, update change_log"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    updates:
      - "fix all blocking findings from self-review"
      - "increment change_log.revision"
      - "add entry to change_log.entries describing fixes"
    verify: "re-run self-review checklist passes"

  - id: confirm-plan-with-user
    action: "Present the complete plan to the user for review and approval before finalizing"
    tool: AskUserQuestion
    present:
      - "plan summary: goal, milestones, task count, agent topology, task horizon"
      - "list of milestones with their goals and task IDs"
      - "list of tasks with goals, write scopes, and validation commands"
      - "any recorded decisions (ADRs)"
      - "design doc references (if UI-facing)"
      - "deployment route (if release-affecting)"
    question: "Does this plan look correct? Reply 'approve' to proceed, or describe what should change."
    output: "user approval or revision requests"
    on_revision: "go back to revise-plan-and-change-log with user feedback, then re-present"
    verify: "user has explicitly approved the plan"

  - id: confirm-horizon
    action: "Set final task_horizon based on task count and scope"
    tool: Edit
    target: "harnass-os/documents/plans/<slug>.yaml"
    logic: |
      If total tasks <= 2 and all sequential: task_horizon = single_task
      If total tasks > 2 or parallel work planned: task_horizon = long_run
    verify: "task_horizon is set to single_task or long_run"

  - id: init-run-and-status-when-long-run
    condition: "plan.task_horizon == long_run"
    action: "Initialize run ledger and status documents"
    tool: Edit
    targets:
      - harnass-os/documents/runs/current.yaml
      - harnass-os/documents/status/current.yaml
    fill:
      runs:
        run_id: "auto-generated"
        plan_id: "from plan.id"
        task_horizon: long_run
        agent_topology: "from plan.agent_topology"
        current_milestone: "first milestone ID"
        current_task: "first task ID"
        active_milestone_worktree: "../milestone-<first-milestone-id>"
        active_milestone_branch: "milestone/<first-milestone-id>"
        active_source_branch: "the branch the runner will merge back into"
        milestone_merge_status: idle
        status: active
      status:
        plan_id: "from plan.id"
        plan_revision: "from plan.change_log.revision"
        active_run: "from runs.run_id"
        current_milestone: "first milestone ID"
        active_milestone_worktree: "../milestone-<first-milestone-id>"
        active_milestone_branch: "milestone/<first-milestone-id>"
        active_source_branch: "the branch the runner will merge back into"
        milestone_merge_status: idle
        next: "first task ID"
    verify: "runs/current.yaml and status/current.yaml have populated fields"

  - id: approve-plan
    action: "Set plan status to approved, mark execution_ready flags, and point status/current.yaml at the active plan"
    tool: Edit
    targets:
      - "harnass-os/documents/plans/<slug>.yaml"
      - "harnass-os/documents/status/current.yaml"
    updates:
      - "status: approved"
      - "review.approved_for_execution: true"
      - "execution_ready.self_review_passed: true"
      - "execution_ready.horizon_confirmed: true"
      - "execution_ready.task_docs_synced: true"
      - "execution_ready.tasks_have_entrypoints: true"
      - "execution_ready.tasks_have_implementation_steps: true"
      - "execution_ready.tasks_have_validation_commands: true"
      - "status/current.yaml plan_id: plan.id"
      - "status/current.yaml plan_revision: plan.change_log.revision"
    verify:
      - "python harnass-os/scripts/agent-guard.py check-plan-gate exits 0"
      - "python harnass-os/scripts/agent-guard.py check-execution-ready exits 0"

  - id: generate-milestone-tasks-md
    action: "Generate the detailed human-readable milestone task tracker from the approved plan"
    tool: Write
    output: "harnass-os/documents/plans/milestone-tasks.md"
    content_rules:
      - "header: # Milestone Tasks"
      - "meta block: plan_id, task_horizon, agent_topology, total_milestones, total_tasks, generated_at, last_updated"
      - "for each milestone: ## <milestone.id> — <milestone.capability>"
      - "milestone meta: goal, depends_on, parallel_policy, execution_context, status"
      - "milestone acceptance criteria as bullet list"
      - "milestone validation commands as bullet list"
      - "milestone done_when line"
      - "summary task table with columns: status_icon | task_id | goal | depends_on | validation_profile"
      - "all tasks start with [ ] (pending)"
      - "for each task: ### <task.id> — <task.goal>"
      - "task detail: status, depends_on, write_scope (bullets), entrypoints (bullets with reason)"
      - "task implementation_steps as numbered list with step, action, tool"
      - "task validation_commands in a code block"
      - "task done_definition"
      - "footer with generation note"
    schema_ref: ../contracts/milestone-tasks-md-schema.yaml
    verify: "harnass-os/documents/plans/milestone-tasks.md exists and contains one detail section per task"

  - id: begin-implementation
    action: "Immediately enter the implement phase — do not wait for user input"
    next_scenario: ../../harnass-engineer-start/documents/shared/scenarios/implement.yaml
    behavior: |
      After plan approval and milestone-tasks.md generation, proceed directly into
      the implement scenario without pausing. Read harnass-os/Implement.md, load the
      approved plan, and pick the first ready task. The user has already approved the
      plan — no further confirmation is needed to start execution.
    tool: Read
    targets:
      - harnass-os/Implement.md
      - "harnass-os/documents/plans/<slug>.yaml"
      - harnass-os/documents/orchestrator/current.yaml
    verify: "implementation phase has started — first task is being picked"

gates:
  enforcement: behavioral
  note: "Gates are enforced through self-review-plan checklist and per-step verify clauses. Blocking findings from self-review must be resolved before approval. The agent-guard check-plan-gate and check-execution-ready commands provide runtime enforcement at commit and execution time."
  items:
    - no-code-edits  # advisory — behavioral constraint, not enforced by scenario step
    - ask-before-final-plan
    - no-ui-plan-without-design-docs
    - no-ui-plan-without-design-validation
    - no-task-without-entrypoints
    - no-task-without-validation
    - no-task-without-validation-commands
    - no-release-plan-without-runtime-and-release-route
    - no-release-plan-without-deployment-route
    - no-major-direction-change-without-decision-record
    - self-review-before-approval
    - no-open-blocking-findings
    - root-runbook-route-guard-stack-required
    - route-and-state-stack-required
emit:
  - harnass-os/documents/inventory/current-state.yaml
  - harnass-os/documents/design/wireframe.md when ui-facing
  - harnass-os/documents/design/design.md when ui-facing
  - harnass-os/documents/validation/design-review.yaml when ui-facing
  - harnass-os/documents/plans/<slug>.yaml
  - harnass-os/documents/runtime/<provider>.yaml when release_affecting
  - harnass-os/documents/release/current.yaml when release_affecting
  - harnass-os/documents/deploy/current.yaml when release_affecting
  - harnass-os/documents/decisions/index.yaml when decision_sensitive
  - harnass-os/documents/plans/milestone-tasks.md
  - harnass-os/documents/runs/current.yaml when long_run
  - harnass-os/documents/status/current.yaml when long_run

