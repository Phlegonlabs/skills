id: task
required:
  - id
  - goal
  - depends_on
  - read_scope
  - write_scope
  - entrypoints
  - agent_role
  - worktree_required
  - implementation_strategy
  - implementation_steps
  - rewrite_policy
  - validation_profile
  - validation_commands
  - artifacts_updated
  - done_definition
  - commit_required
  - handoff_output
  - status
  - ui task refs design docs when ui-facing
  - release task refs runtime and release docs when release-affecting
  - release task refs deploy commands and rollback note when release-affecting
  - plan change rule
field_types:
  id: "string, unique task identifier (e.g. t1-descriptive-name)"
  goal: "string, one-sentence description of what the task accomplishes"
  depends_on: "list[string], task IDs this depends on ([] if none)"
  read_scope: "list[string], files/directories the task needs to read"
  write_scope: "list[string], files the task will create or modify"
  entrypoints: "list[{file, reason}], files to read FIRST with reason"
  agent_role: "enum: solo, worker"
  worktree_required: "boolean"
  implementation_strategy: "enum: rewrite-by-replacement"
  implementation_steps: "list[{step, action, tool, output/target/command}], concrete steps with action/tool/output"
  rewrite_policy: "enum: replacement-first"
  validation_profile: "string, profile name from validation/profiles.yaml"
  validation_commands: "list[string], actual shell commands to run; these should be execution-ready and fully resolved whenever possible"
  artifacts_updated: "list[string], files changed by this task"
  done_definition: "string, one sentence describing when this task is done"
  commit_required: "boolean, always true"
  handoff_output: "string, path — harnass-os/documents/handoffs/<task-id>.yaml"
  status: "enum: pending, ready, in_progress, blocked, validated, committed"
  introduced_in_revision: "optional integer, first plan.change_log.revision that introduced this task"
  integration_flows: "optional list[{flow_id, path, mode, steps, expected_requests, pass_when, audit_account_ref?}], critical FE/BE flows this task must preserve or validate"
  audit_refs: "optional list[string], deploy/audit/runtime docs that must be updated or checked by this task"
conditional_required:
  ui_facing:
    - wireframe_ref
    - design_ref
  release_affecting:
    - runtime_ref
    - release_ref
    - deploy_commands_ref
    - rollback_note
  decision_sensitive:
    - decision_refs
status: [pending, ready, in_progress, blocked, validated, committed]
gates:
  - one-task-one-commit
  - one-primary-write-scope
  - task-needs-entrypoints
  - task-needs-implementation-steps
  - validation-before-commit
  - ui-work-needs-design-docs
  - plan-change-before-task-change
notes:
  - committed tasks are historical facts and must not be auto-rewritten by drift sync; follow-up work creates new tasks instead
  - executor flow is one-task-one-commit; validation evidence is written before the commit is created
use:
  - harnass-os/documents/plans/<slug>.yaml
  - harnass-os/documents/design/wireframe.md when ui-facing
  - harnass-os/documents/design/design.md when ui-facing
  - harnass-os/documents/runtime/<provider>.yaml when release-affecting
  - harnass-os/documents/release/current.yaml when release-affecting
  - harnass-os/documents/deploy/current.yaml when release-affecting
  - harnass-os/documents/decisions/index.yaml when decision-sensitive
  - harnass-os/documents/handoffs/<task-id>.yaml
