id: milestone-tasks-md
path: harnass-os/documents/plans/milestone-tasks.md
purpose: Human-readable milestone and task progress tracker with full task detail
generated_by: research-and-plan scenario (after plan approval)
updated_by: implement scenario (after each task commit)
format: markdown
sections:
  - header: "# Milestone Tasks"
  - meta: "plan_id, task_horizon, agent_topology, total_milestones, total_tasks, generated_at, last_updated"
  - per_milestone:
      heading: "## <milestone.id> — <milestone.capability>"
      meta_block:
        fields: [goal, depends_on, parallel_policy, execution_context, status]
      acceptance_criteria_list: "bullet list of milestone.acceptance_criteria"
      validation_commands_list: "bullet list of milestone.validation_commands"
      done_when: "milestone.done_when"
      task_table:
        columns: [status_icon, task_id, goal, depends_on, validation_profile]
        status_icons:
          pending: "[ ]"
          ready: "[-]"
          in_progress: "[~]"
          validated: "[v]"
          committed: "[x]"
          blocked: "[!]"
      per_task_detail:
        heading: "### <task.id> — <task.goal>"
        fields:
          - "**Status**: <task.status>"
          - "**Depends on**: <task.depends_on or none>"
          - "**Write scope**: <task.write_scope as bullet list>"
          - "**Entrypoints**: <task.entrypoints as bullet list with reason>"
          - "**Implementation steps**:"
          - numbered_list: "task.implementation_steps with step, action, tool"
          - "**Validation commands**:"
          - code_block: "task.validation_commands as shell commands"
          - "**Done when**: <task.done_definition>"
  - footer: "---\nGenerated by harnass-engineer-plan. Updated by harnass-engineer during implementation."
rules:
  - one row per task in summary table
  - full detail section per task below the table
  - status icon updates on each task state change
  - milestone heading gets a checkmark when all tasks committed
  - task detail section shows latest validation result after each run
  - file is append-safe — only status icons, status fields, and last_updated change during implementation
