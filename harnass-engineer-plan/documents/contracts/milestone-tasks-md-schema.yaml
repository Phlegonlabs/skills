id: milestone-tasks-md
path: harnass-os/documents/plans/milestone-tasks.md
purpose: Human-readable milestone and task progress tracker
generated_by: research-and-plan scenario (after plan approval)
updated_by: implement scenario (after each task commit)
format: markdown
sections:
  - header: "# Milestone Tasks"
  - meta: "plan_id, task_horizon, generated_at, last_updated"
  - per_milestone:
      heading: "## <milestone.id> — <milestone.goal>"
      task_table:
        columns: [status_icon, task_id, goal, depends_on, validation_profile]
        status_icons:
          pending: "[ ]"
          in_progress: "[~]"
          committed: "[x]"
          failed: "[!]"
  - footer: "---\nGenerated by harnass-engineer-plan. Updated by harnass-engineer during implementation."
rules:
  - one row per task
  - status icon updates on each task commit
  - milestone heading gets a checkmark when all tasks committed
  - file is append-safe — only status icons and last_updated change during implementation
