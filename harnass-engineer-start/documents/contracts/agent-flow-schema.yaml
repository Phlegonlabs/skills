id: bootstrap-flow
lead:
  - classify-repo
  - pick-scenario
  - load-routes
  - emit-full-scaffold
  - stop-before-planning
worker:
  - one-task
  - one-write-scope
  - validate-and-commit-own-task
advisory_gates:  # governance rules — not enforced by code or scenario steps
  - start-does-not-own-discovery
  - start-does-not-own-plan-approval
  - do not assign overlapping write scopes to parallel workers
  - keep one bootstrap task per worktree
  - use target repo documents and handoffs as the only durable coordination channel
handoff:
  - bootstrap_id
  - scaffolded_layers
  - validation_summary
  - next_owner
