id: re-plan-request-queue
write: harnass-os/documents/intake/re-plan-requests/current.yaml
required:
  - requests
request_fields:
  request_id: "string, stable durable request identifier"
  created_at: "UTC timestamp, ISO 8601"
  source: "enum: user"
  change_type: "enum: tech_stack_restructure, architecture_rework, major_feature_removal, major_feature_redo, platform_shift, ambiguous"
  routing_decision: "enum: re_plan, needs_human_triage"
  routing_reason: "string, explains why the request cannot stay in the follow-up lane"
  summary: "string, concise user-visible request summary"
  details: "string, fuller request context"
  target_plan_id: "string|null, active plan this request applies to"
  approval_status: "enum: pending_manual_approval, approved, rejected"
  status: "enum: pending, triage_required, routed, fulfilled, superseded"
optional_fields:
  affected_surfaces: "list[string], files, directories, or system layers likely to be impacted"
  constraints: "list[string], explicit user or platform constraints that must be preserved"
  approved_at: "UTC timestamp when a human approved the re-plan"
  approved_by: "string, human approver identity"
  routed_at: "UTC timestamp when the request was converted into a revised planning pass"
  routed_revision: "integer, plan.change_log.revision created when re-plan routing started"
  replacement_plan_id: "string, revised detailed plan emitted by the re-plan flow"
  fulfilled_at: "UTC timestamp when a manually approved revised plan unblocked execution"
  fulfilled_revision: "integer, approved plan.change_log.revision that closed this request"
rules:
  - re-plan requests must be durable and replay-safe
  - routing_decision=re_plan requires a full revised planning pass before execution may continue
  - routing_decision=needs_human_triage pauses automatic routing until a human resolves the ambiguity
  - re-plan requests never auto-approve execution
  - approved revised plans resume execution only after manual approval
use:
  - harnass-os/documents/intake/re-plan-requests/current.yaml
  - harnass-os/documents/plans/<slug>.yaml
