id: intake
out: harnass-os/documents/intake/request.yaml
required:
  - request_id
  - user_goal
  - project_name
  - project_idea
  - constraints
  - requested_changes
  - signals
  - initial_horizon
  - app_type
horizon: [single_task, long_run, undecided]
app_type: [web, cli, mobile-ios, mobile-android, desktop, api-only]
signals:
  - repo_bootstrap
  - narrow_change
  - multi_surface_change
  - new_product
  - multi_milestone
  - open_scope

