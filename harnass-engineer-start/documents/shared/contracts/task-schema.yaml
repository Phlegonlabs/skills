id: task
required:
  - id
  - goal
  - depends_on
  - read_scope
  - write_scope
  - entrypoints
  - agent_role
  - worktree_required
  - implementation_strategy
  - implementation_steps
  - rewrite_policy
  - validation_profile
  - validation_commands
  - artifacts_updated
  - done_definition
  - commit_required
  - handoff_output
  - status
conditional_required:
  ui_facing:
    - wireframe_ref
    - design_ref
    - integration_flows
  release_affecting:
    - runtime_ref
    - release_ref
    - deploy_commands_ref
    - rollback_note
  decision_sensitive:
    - decision_refs
status: [pending, ready, in_progress, blocked, validated, committed]
gates:
  - one-task-one-commit
  - one-primary-write-scope
  - task-needs-entrypoints
  - task-needs-implementation-steps
  - validation-before-commit
  - ui-work-needs-design-docs
  - plan-change-before-task-change
