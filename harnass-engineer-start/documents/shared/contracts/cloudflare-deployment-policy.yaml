id: cloudflare-deployment
provider: cloudflare
surfaces:
  - pages
  - workers
required_inputs:
  - account_id
  - project_or_worker_name
  - production_domain
  - preview_url_pattern
  - wrangler_config_or_stack_equivalent
  - harnass-os/documents/runtime/cloudflare.yaml
  - harnass-os/documents/release/current.yaml
discover:
  pages:
    detect_files: [wrangler.toml, package.json]
    detect_conditions:
      - "wrangler.toml contains [pages] or pages_build_output_dir"
      - "OR package.json has a build script producing dist/ or .next/ or build/"
    extract:
      project_name: "from wrangler.toml name field"
      build_command: "from package.json scripts.build"
      build_output_dir: "from wrangler.toml pages_build_output_dir OR detect from framework (dist/build/.next)"
      preview_url: "https://preview.${project_name}.pages.dev"
      production_url: "https://${project_name}.pages.dev OR custom domain from wrangler.toml"
  workers:
    detect_files: [wrangler.toml]
    detect_conditions:
      - "wrangler.toml contains main field pointing to worker entry"
    extract:
      worker_name: "from wrangler.toml name field"
      build_command: "from package.json scripts.build OR none"
      preview_url: "from wrangler.toml env.preview route OR https://${worker_name}.${account_subdomain}.workers.dev"
      production_url: "from wrangler.toml routes OR custom domain"
preview_flow:
  - step: build
    command: "${build_command}"
    verify: "exit code 0"
  - step: deploy-preview
    command: "${preview_deploy_command}"
    verify: "deployment URL returned"
  - step: smoke-check
    command: "curl -sf ${preview_url}/ || exit 1"
    verify: "HTTP 200"
  - step: browser-validation
    command: "echo 'manual: open ${preview_url} and verify primary user flows'"
    verify: "visual inspection passes"
production_flow:
  - step: gate-check
    command: "python harnass-os/scripts/agent-guard.py check-deployment-ready"
    verify: "exit code 0"
  - step: deploy-production
    command: "${production_deploy_command}"
    verify: "deployment URL returned"
  - step: smoke-check
    command: "curl -sf ${production_url}/ || exit 1"
    verify: "HTTP 200"
  - step: log-check
    command: "echo 'manual: check Cloudflare dashboard analytics and logs for errors'"
    verify: "no critical errors in first 5 minutes"
rollback:
  - step: redeploy-previous
    command: "${rollback_command}"
    verify: "previous stable version restored"
  - step: verify-rollback
    command: "curl -sf ${production_url}/ || exit 1"
    verify: "HTTP 200 with previous version"
  - step: restore-bindings
    condition: "environment bindings changed"
    command: "echo 'manual: restore previous wrangler.toml bindings and redeploy'"
gates:
  - no-production-without-preview
  - no-production-without-smoke-check
  - runtime-doc-must-exist-before-deploy
  - release-doc-must-pass-before-production
  - record-preview-and-production-urls-in-documents

