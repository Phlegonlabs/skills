id: release
out: harnass-os/documents/release/current.yaml
required:
  - plan_id
  - deployment_ref
  - runtime_ref
  - preview_url
  - production_url
  - preview_status
  - preview_acceptance
  - production_gate
  - production_revision
  - rollback_target
  - release_notes
  - final_audit_ref
  - final_audit_status
  - status
status: [draft, preview_pending, preview_passed, production_ready, released, awaiting-final-audit, audit_pending, audit_failed, complete, rollback_required]
gates:
  - preview-must-pass-before-production
  - rollback-target-required-before-release
  - release-doc-required-for-production
  - final-audit-required-before-release-signoff

