id: hooks
materialization:
  hook_root: harnass-os/hooks
  install_modes:
    - harnass-os/hooks checked into the repo
    - core.hooksPath or stack-equivalent pointing at harnass-os/hooks
  default_guard_entry: harnass-os/scripts/agent-guard.py
  templates:
    pre_commit: ../templates/target-repo/hooks/pre-commit
    commit_msg: ../templates/target-repo/hooks/commit-msg
    pre_push: ../templates/target-repo/hooks/pre-push
guards:
  start:
    run: [classify-intake-horizon, seed-execution-state]
  plan_review:
    run: [confirm-plan-horizon, check-plan-review]
  task_change:
    run: [record-task-change, check-task-sync]
  execute:
    run: [check-plan-gate, check-execution-ready, check-handoff-ready]
  deploy:
    run: [check-deployment-ready]
notes:
  bootstrap_window:
    behavior: "pre-commit and pre-push exit early while only bootstrap history exists and no plan file has been created yet"
    implementation_ref: "bootstrap_window_open() in harnass-os/hooks/pre-commit and harnass-os/hooks/pre-push"
  route_level_checks:
    - "check-design-sync remains a router/phase guard, not a git hook"
    - "check-final-audit-ready and check-release-signoff remain router/phase guards, not git hooks"
required_hooks:
  pre_commit:
    path: harnass-os/hooks/pre-commit
    run: [orchestrator-tick, check-plan-gate, record-task-change, check-task-sync, check-task-fields, check-write-scope-overlap]
    note: "skipped during the bootstrap window before the first plan file exists"
  commit_msg:
    path: harnass-os/hooks/commit-msg
    run: [task-id-or-plan-revision-context]
  pre_push:
    path: harnass-os/hooks/pre-push
    run: [check-execution-ready, check-task-deps, check-validation-complete]
    conditional_run:
      - check: check-handoff-ready
        when: "harnass-os/documents/handoffs/*.yaml exists"
      - check: check-deployment-ready
        when: "harnass-os/documents/deploy/current.yaml exists and deploy status is not draft"
    note: "skipped during the bootstrap window before the first plan file exists"
optional_hooks:
  pre_merge:
    run: [milestone-integration-validation]
  custom_guard:
    run: [forbid-direct-edits-in-deprecated-modules]
gates:
  - choose-smallest-stack-compatible-tool
  - max-hooks-default
  - guards-own-state-sync
  - scope-by-changed-surface
  - no-commit-before-document-sync



