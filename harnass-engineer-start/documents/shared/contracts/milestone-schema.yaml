id: milestone
required:
  - id
  - capability
  - goal
  - execution_context
  - depends_on
  - parallel_policy
  - acceptance_criteria
  - validation_commands
  - done_when
  - failure_policy
  - demo_flow
  - exit_validation
  - tasks
  - status
status: [pending, ready, in_progress, blocked, complete]
gates:
  - capability-not-filetype
  - milestone-tasks-reference-top-level-task-ids
  - milestone-exit-validation-required
  - milestone-stop-and-fix
notes:
  - execution_context defaults to milestone-worktree for long-run delivery
  - milestone worktree commits merge back only after exit_validation passes
