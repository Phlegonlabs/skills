id: audit-browser-report
out: harnass-os/documents/audit/browser/current.yaml
required:
  - report_id
  - target_url
  - generated_by
  - generated_at
  - status
  - flows
  - console_errors
  - network_failures
  - screenshots
  - blocking_findings
status: [pending, failed, passed]
flow_required:
  - flow_id
  - path
  - mode
  - status
  - steps
  - expected_requests
  - pass_when
flow_mode: [read_only, stateful]
flow_status: [pending, failed, passed]
