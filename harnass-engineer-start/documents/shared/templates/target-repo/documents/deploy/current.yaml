provider: <fill>
surface: <fill>
project: <fill>
runtime_ref: <fill>
release_ref: harnass-os/documents/release/current.yaml
post_deploy_audit_required: true
deploy_mode: manual

# Agent MUST NOT trigger deploy automatically.
# User deploys after confirming all secrets and .env values are in place.
secrets_gate:
  status: pending_user_input   # pending_user_input | confirmed | skipped
  env_file_confirmed: false    # user has filled .env from .env.example
  secrets_confirmed: false     # user has confirmed all secrets are in place
  confirmed_by: null           # filled by user when ready
  confirmed_at: null
  note: "Fill .env from .env.example, confirm all secrets, then run deploy commands manually per Deploy.md."
preview_environment:
  name: preview
  url: <fill>
production_environment:
  name: production
  url: <fill>
build_command: <fill>
preview_deploy_command: <fill>
production_deploy_command: <fill>
preview_validation:
  profile: cloudflare-preview
  status: pending
production_validation:
  profile: cloudflare-production
  status: pending
smoke_checks:
  - <fill>
smoke_command_refs:
  - <fill>
rollback_strategy: <fill>
rollback_command: <fill>
status: draft
discover:
  cloudflare_pages:
    detect: "wrangler.toml exists AND (pages_build_output_dir set OR framework detected)"
    fill:
      surface: pages
      build_command: "from package.json 'build' script"
      preview_deploy_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch preview"
      production_deploy_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch main"
      rollback_strategy: redeploy-previous-sha
      rollback_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch main --commit-hash ${previous_stable_sha}"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  cloudflare_workers:
    detect: "wrangler.toml exists AND main field points to worker script"
    fill:
      surface: workers
      build_command: "from package.json 'build' script OR 'npx wrangler deploy --dry-run'"
      preview_deploy_command: "npx wrangler deploy --env preview"
      production_deploy_command: "npx wrangler deploy --env production"
      rollback_strategy: redeploy-previous-version
      rollback_command: "npx wrangler rollback"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  static_site:
    detect: "no wrangler.toml AND package.json has build script producing dist/ or build/"
    fill:
      surface: pages
      build_command: "from package.json 'build' script"
      preview_deploy_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch preview"
      production_deploy_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch main"
      rollback_strategy: redeploy-previous-sha
      rollback_command: "npx wrangler pages deploy ${build_output_dir} --project-name ${project} --branch main --commit-hash ${previous_stable_sha}"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  vercel:
    detect: "vercel.json exists OR framework detected with Vercel deployment"
    fill:
      surface: vercel
      build_command: "from package.json 'build' script"
      preview_deploy_command: "npx vercel --prebuilt"
      production_deploy_command: "npx vercel --prod --prebuilt"
      rollback_strategy: redeploy-previous-deployment
      rollback_command: "npx vercel rollback"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  vercel_edge:
    detect: "vercel.json exists AND edge runtime configured"
    fill:
      surface: vercel_edge
      build_command: "from package.json 'build' script"
      preview_deploy_command: "npx vercel --prebuilt"
      production_deploy_command: "npx vercel --prod --prebuilt"
      rollback_strategy: redeploy-previous-deployment
      rollback_command: "npx vercel rollback"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  aws_amplify:
    detect: "amplify.yml exists OR amplify/ directory present"
    fill:
      surface: amplify
      build_command: "from package.json 'build' script"
      preview_deploy_command: "npx amplify push --yes"
      production_deploy_command: "npx amplify publish --yes"
      rollback_strategy: redeploy-previous-version
      rollback_command: "npx amplify publish --yes --restore"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  fly_io:
    detect: "fly.toml exists"
    fill:
      surface: fly
      build_command: "from package.json 'build' script OR Dockerfile"
      preview_deploy_command: "fly deploy --app ${project}-preview"
      production_deploy_command: "fly deploy --app ${project}"
      rollback_strategy: redeploy-previous-version
      rollback_command: "fly releases rollback --app ${project}"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  railway:
    detect: "railway.json exists OR Procfile present"
    fill:
      surface: railway
      build_command: "from package.json 'build' script"
      preview_deploy_command: "railway up --environment preview"
      production_deploy_command: "railway up --environment production"
      rollback_strategy: redeploy-previous-deployment
      rollback_command: "railway rollback --environment production"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  docker:
    detect: "Dockerfile exists"
    fill:
      surface: container
      build_command: "docker build -t ${project}:latest ."
      preview_deploy_command: "docker push ${registry}/${project}:preview"
      production_deploy_command: "docker push ${registry}/${project}:latest"
      rollback_strategy: redeploy-previous-tag
      rollback_command: "docker pull ${registry}/${project}:${previous_stable_tag} && docker tag ${registry}/${project}:${previous_stable_tag} ${registry}/${project}:latest && docker push ${registry}/${project}:latest"
      smoke_command_refs:
        - "curl -sf ${preview_url}/ || exit 1"
  generic:
    detect: "no provider-specific config detected"
    fill:
      surface: static
      build_command: "from package.json 'build' script"
      preview_deploy_command: "<fill>"
      production_deploy_command: "<fill>"
      rollback_strategy: "<fill>"
      rollback_command: "<fill>"
      smoke_command_refs:
        - "<fill>"

