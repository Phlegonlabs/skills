provider: chrome-extension
manifest_version: 3
extension_id_source: developer_dashboard   # new | developer_dashboard
extension_id: null
permissions: []
host_permissions: []
content_scripts: []
background_worker:
  type: service-worker    # MV3: service-worker; MV2: persistent-background-page
  path: null
popup_path: null
options_page_path: null
web_accessible_resources: []
target_browsers: [chrome]
store_listing:
  title: null
  short_description: null
  category: null
  screenshots: []
publishing:
  developer_account: null
  visibility: public         # public | unlisted | private
  environments:
    dev:
      mode: load-unpacked
      path: dist/
    production:
      mode: cws-upload
      package_command: "zip -r extension.zip dist/"
      upload_tool: chrome-webstore-upload    # or manual
