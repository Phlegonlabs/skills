provider: open-source-library
package_name: null
registry: null               # npmjs | crates-io | pypi | pkg-go-dev | jsr
license: null
changelog_path: CHANGELOG.md
tag_format: "v${version}"
semver_policy: strict-semver  # strict-semver | semantic-release | changesets | manual
publish_command: null
pre_publish_checks: []
publishing:
  registry_auth_source: null   # e.g. NPM_TOKEN / CARGO_REGISTRY_TOKEN
  release_approval_owner: null
  environments:
    beta:
      tag: beta
      command: null
    stable:
      tag: latest
      command: null
  release_notes:
    format: conventional-commits   # conventional-commits | keepachangelog | manual
    auto_generate: false
contributor_docs:
  contributing_md: CONTRIBUTING.md
  code_of_conduct: CODE_OF_CONDUCT.md
  issue_templates: .github/ISSUE_TEMPLATE/
