id: plan-shape
write: harnass-os/documents/plans/<slug>.yaml
slug_rule: "slug = sanitize(intake.project_name): lowercase, replace non-alphanumeric with hyphens, collapse consecutive hyphens, strip edges. The plan id field must equal the slug."
must:
  - intake ref
  - milestone-tasks.md tracker output
  - task horizon
  - agent topology
  - release_affecting route flag
  - decision_sensitive route flag
  - repo entrypoints and command facts in inventory
  - wireframe and design refs when ui-facing
  - frontend-design skill requirement when ui-facing
  - design validation route when ui-facing
  - decision refs when the plan changes major ui, runtime, release, or architecture direction
  - deployment route when release-affecting
  - runtime and release refs when release-affecting
  - review block
  - change log
  - execution_ready
  - orchestration block
  - hybrid intake routing semantics for follow-up versus re-plan
  - capability milestones
  - top-level tasks section with task objects
  - milestone task-id references
  - execution-ready task entrypoints and implementation steps
  - validation profile per task
  - validation commands per task
  - commit rule per task
  - handoff output per task
use:
  - harnass-os/documents/intake/request.yaml
  - harnass-os/documents/inventory/current-state.yaml
  - harnass-os/documents/design/wireframe.md when ui-facing
  - harnass-os/documents/design/design.md when ui-facing
  - harnass-os/documents/validation/design-review.yaml when ui-facing
  - harnass-os/documents/runtime/<provider>.yaml when release-affecting
  - harnass-os/documents/release/current.yaml when release-affecting
  - harnass-os/documents/deploy/current.yaml when release-affecting
  - harnass-os/documents/decisions/index.yaml when decision-sensitive
  - harnass-os/documents/runs/current.yaml when long-run
  - harnass-os/documents/status/current.yaml when long-run
  - harnass-os/documents/intake/change-requests/current.yaml when explicit user follow-up requests are queued
  - harnass-os/documents/intake/re-plan-requests/current.yaml when structural changes or ambiguous requests require re-planning
orchestration_block:
  sync_status: "enum: clean, needs_review, applying_followup, needs_replan, needs_human_triage"
  observed_changes: "list[string], inferred repo drift that forced a draft revision"
  affected_task_ids: "list[string], tasks most impacted by the latest automatic plan sync"
  last_auto_update_at: "UTC timestamp of the latest orchestrator plan writeback"
  last_change_request_ids: "list[string], explicit user requests folded into the current revision"
  last_replan_request_ids: "list[string], structural or ambiguous requests that forced a re-plan or manual triage"
  routing_decision: "enum: none, follow_up, re_plan, needs_human_triage"
  manual_approval_required: "boolean, must be true when routing_decision is re_plan or needs_human_triage"
