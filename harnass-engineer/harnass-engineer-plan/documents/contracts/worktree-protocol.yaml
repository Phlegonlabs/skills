id: plan-worktree
lead:
  - plan-state
  - milestone-scheduling
  - task-dispatch
  - milestone-acceptance
worker:
  - one-task
  - one-worktree
  - task-validation
  - task-commit
rules:
  - mark worktree_required true for every task with non-trivial edits
  - do not schedule parallel tasks with overlapping write scopes
  - one validated task becomes one commit by its worker
  - require handoff YAML after every committed task
conventions:
  task_branch_or_worktree: task/<task-id> or stack-equivalent
  handoff_after_commit: harnass-os/documents/handoffs/<task-id>.yaml
  long_run_state:
    - harnass-os/documents/runs/current.yaml
    - harnass-os/documents/status/current.yaml
  parallel_rule: never assign overlapping write_scope values at the same time
gates:
  - do not assign overlapping write scopes in parallel
  - one validated task becomes one commit by its worker
  - update handoff YAML after every committed task
  - lead agent advances the next task only after handoff exists
