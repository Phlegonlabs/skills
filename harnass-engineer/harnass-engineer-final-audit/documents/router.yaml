id: final-audit
pick:
  production-not-ready: run-deploy-first
  production-ready: production-final-audit
load:
  - ../../harnass-engineer-start/documents/shared/routes/default-sequence.yaml
  - ./routes/load-discipline.yaml
  - harnass-os/Audit.md
  - harnass-os/documents/orchestrator/current.yaml
  - harnass-os/documents/audit/current.yaml
  - harnass-os/documents/release/current.yaml
  - harnass-os/documents/deploy/current.yaml
  - harnass-os/documents/inventory/current-state.yaml
  - harnass-os/documents/status/current.yaml
scenarios:
  run-deploy-first:
    local:
      - ./scenarios/run-deploy-first.yaml
  production-final-audit:
    local:
      - ./scenarios/production-final-audit.yaml
      - ./contracts/final-audit-schema.yaml
      - ./contracts/module-selection-schema.yaml
emit:
  - target.final-audit-updated
  - target.final-audit-history-written
  - target.final-audit-findings-written
  - target.release-signoff-updated
