id: audit-module-selection
selection_mode: adaptive-by-app-type-and-stack
smoke_policy: module-specific-smoke-first
modules:
  - frontend-experience
  - frontend-quality
  - accessibility
  - backend-runtime
  - api-contract
  - frontend-backend-integration
  - security
  - content-quality
  - content-safety
  - seo
  - performance-observability
  - deploy-runtime-consistency
  - ci-cd-release-hygiene
  - documentation-signoff
  - blockchain-contract-audit
blockchain_detection:
  repo-detected-only: true
  detect_from:
    - foundry.toml
    - hardhat.config.*
    - truffle-config.*
    - contracts/**/*.sol
    - Anchor.toml
    - programs/
    - "package.json dependencies: [ethers, viem, wagmi, @openzeppelin/*]"
classification_sources:
  from_inventory:
    - app_type
    - ui_facing
  from_audit_inspection:
    - rendering_model   # derived: spa, hybrid, ssr, static (replaces raw spa/hybrid/browser-only)
    - has_public_pages   # detected from routes/pages during inspect-repo-and-surface
    - has_api_routes     # detected from routes/handlers during inspect-repo-and-surface
    - blockchain_tooling_detected  # detected from config/deps during inspect-repo-and-surface
  mapping:
    web: "includes spa, hybrid, ssr, static — determined by rendering_model at audit time"
    browser-only: "deprecated — use app_type == web AND rendering_model == spa AND no backend"
rules:
  - run smoke first for modules with live runtime or deployed-surface checks
  - skip non-applicable modules explicitly; do not leave them implicit
  - blockchain projects must audit contract logic and security risk
applicability_rules:
  frontend-experience:
    applies_when: "app_type == web AND has_public_pages"
  frontend-quality:
    applies_when: "app_type in [web, desktop]"
  accessibility:
    applies_when: "app_type == web"
  backend-runtime:
    applies_when: "app_type not in [api-only] implies backend; always true except pure static"
  api-contract:
    applies_when: "has_api_routes"
  frontend-backend-integration:
    applies_when: "ui_facing AND has_api_routes"
  security:
    applies_always: true
  content-quality:
    applies_when: "ui_facing"
  content-safety:
    applies_when: "ui_facing"
  seo:
    applies_when: "app_type == web AND has_public_pages"
  performance-observability:
    applies_always: true
  deploy-runtime-consistency:
    applies_always: true
  ci-cd-release-hygiene:
    applies_always: true
  documentation-signoff:
    applies_always: true
  blockchain-contract-audit:
    applies_when: "blockchain_tooling_detected"
smoke_required_modules:
  - frontend-experience
  - backend-runtime
  - api-contract
  - frontend-backend-integration
  - seo
  - performance-observability
  - deploy-runtime-consistency
  - blockchain-contract-audit
smoke_to_deep_rule: "if smoke_status == failed, skip deep audit for that module and mark deep_audit_status as skipped"
skipped_check_required:
  - module_id
  - reason
