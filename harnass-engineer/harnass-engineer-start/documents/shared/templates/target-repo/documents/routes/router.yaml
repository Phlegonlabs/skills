id: target-repo-router
version: 0.7.0
flow:
  - intake
  - inventory
  - plan
  - design
  - design_validation
  - implement
  - deploy
  - final_audit
  - documentation
gates:
  - bootstrap-before-plan
  - frontend-design-before-ui-plan-approval
  - design-validation-before-ui-implementation
  - approved-plan-before-implement
  - preview-validation-before-production
  - final-audit-before-release-signoff
  - handoff-before-next-task
routes:
  intake:
    read:
      - harnass-os/AGENTS.md
      - harnass-os/CLAUDE.md
      - harnass-os/Plan.md
      - harnass-os/documents/intake/request.yaml
  inventory:
    read:
      - harnass-os/documents/inventory/current-state.yaml
      - harnass-os/documents/validation/profiles.yaml
  plan:
    read:
      - harnass-os/Plan.md
      - harnass-os/documents/intake/request.yaml
      - harnass-os/documents/inventory/current-state.yaml
      - harnass-os/documents/orchestrator/current.yaml
    conditional:
      - file: harnass-os/documents/design/wireframe.md
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/design/design.md
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/validation/design-review.yaml
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/runtime/{provider}.yaml
        when: "inventory.runtime.provider is set and not <fill>"
      - file: harnass-os/documents/release/current.yaml
        when: "discovery or user scope indicates release-affecting work"
      - file: harnass-os/documents/deploy/current.yaml
        when: "discovery or user scope indicates release-affecting work"
      - file: harnass-os/documents/decisions/index.yaml
        when: "planning records a durable decision"
  design:
    read:
      - harnass-os/documents/design/wireframe.md
      - harnass-os/documents/design/design.md
      - harnass-os/documents/validation/design-review.yaml
    gate:
      condition: "inventory.ui_facing == true"
      guard_command: "python harnass-os/scripts/agent-guard.py check-design-sync"
  design_validation:
    read:
      - harnass-os/Plan.md
      - harnass-os/documents/design/wireframe.md
      - harnass-os/documents/design/design.md
      - harnass-os/documents/validation/design-review.yaml
    gate:
      condition: "inventory.ui_facing == true"
      guard_command: "python harnass-os/scripts/agent-guard.py check-design-sync"
  implement:
    read:
      - harnass-os/Implement.md
      - harnass-os/documents/plans/<slug>.yaml
      - harnass-os/documents/orchestrator/current.yaml
    conditional:
      - file: harnass-os/documents/design/wireframe.md
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/design/design.md
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/runs/current.yaml
        when: "plan.task_horizon == long_run"
      - file: harnass-os/documents/status/current.yaml
        when: "plan.task_horizon == long_run"
    gate:
      condition: "plan.status == approved"
      guard_command: "python harnass-os/scripts/agent-guard.py check-execution-ready"
  deploy:
    read:
      - harnass-os/Deploy.md
      - harnass-os/documents/orchestrator/current.yaml
      - harnass-os/documents/runtime/{provider}.yaml
      - harnass-os/documents/release/current.yaml
      - harnass-os/documents/deploy/current.yaml
      - harnass-os/documents/status/current.yaml
    gate:
      condition: "plan.release_affecting == true"
      guard_command: "python harnass-os/scripts/agent-guard.py check-deployment-ready"
  final_audit:
    read:
      - harnass-os/Audit.md
      - harnass-os/documents/orchestrator/current.yaml
      - harnass-os/documents/audit/current.yaml
      - harnass-os/documents/release/current.yaml
      - harnass-os/documents/deploy/current.yaml
      - harnass-os/documents/status/current.yaml
      - harnass-os/documents/inventory/current-state.yaml
    conditional:
      - file: harnass-os/documents/runtime/{provider}.yaml
        when: "inventory.runtime.provider is set and not <fill>"
      - file: harnass-os/documents/design/wireframe.md
        when: "inventory.ui_facing == true"
      - file: harnass-os/documents/design/design.md
        when: "inventory.ui_facing == true"
    gate:
      condition: "deploy.post_deploy_audit_required == true"
      guard_command: "python harnass-os/scripts/agent-guard.py check-final-audit-ready"
  documentation:
    read:
      - harnass-os/Documentation.md
      - harnass-os/documents/orchestrator/current.yaml
      - harnass-os/documents/audit/current.yaml
      - harnass-os/documents/decisions/index.yaml
      - harnass-os/documents/status/current.yaml
      - harnass-os/documents/handoffs/<task-id>.yaml
    gate:
      condition: "deploy.post_deploy_audit_required == true AND deploy.status in [deployed, rollback_required]"
      guard_command: "python harnass-os/scripts/agent-guard.py check-release-signoff"


