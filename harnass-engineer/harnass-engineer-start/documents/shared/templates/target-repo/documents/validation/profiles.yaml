id: repo-validation-profiles
note: >
  Commands use ${variable} references that resolve from inventory, deploy, release, and runtime docs.
  During plan phase, tasks should emit fully resolved validation_commands, but the executor also resolves supported variables at runtime.
  Unresolved variables fail closed and validation/history captures the exact commands that ran.
profiles:
  design-review:
    layers: [design]
    tools: [wireflow-review, screenshot-review, responsive-checklist]
    pass: [flows-covered, states-covered, responsive-covered]
    failure_policy: repair_before_advance
    commands:
      - "echo 'design-review: manual wireframe and screenshot inspection required'"
      - "echo 'check: primary user flows drawn in wireframe.md'"
      - "echo 'check: loading/error/empty states documented in design.md'"
      - "echo 'check: responsive breakpoints listed in design.md'"
    fallback_discovery:
      - "read harnass-os/documents/design/wireframe.md for flow coverage"
      - "read harnass-os/documents/design/design.md for state and responsive coverage"
  static-js:
    layers: [static]
    tools: [eslint, typecheck]
    pass: [no-lint-errors, no-type-errors]
    failure_policy: repair_before_advance
    commands:
      - "${lint_command} --max-warnings 0"
      - "${typecheck_command}"
    fallback_discovery:
      - "read package.json scripts for lint and typecheck commands"
      - "fallback lint: npx eslint . --max-warnings 0"
      - "fallback typecheck: npx tsc --noEmit"
  runtime-startup:
    layers: [runtime]
    tools: [build, startup-smoke-run]
    pass: [clean-boot]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${dev_command} &"
      - "sleep 3 && curl -sf http://localhost:${dev_port}/health || curl -sf http://localhost:${dev_port}/ || exit 1"
      - "kill %1 2>/dev/null || true"
    fallback_discovery:
      - "read package.json scripts for build and dev commands"
      - "read wrangler.toml for dev port"
      - "fallback build: npm run build"
      - "fallback dev: npm run dev"
  ui-path:
    layers: [ui]
    tools: [browser-check, console-check, network-check]
    pass: [flow-complete, no-blocking-console-errors, no-blocking-network-errors]
    failure_policy: repair_before_advance
    commands:
      - "${dev_command} &"
      - "sleep 3"
      - "curl -sf http://localhost:${dev_port}${ui_test_path} || exit 1"
      - "echo 'manual: open browser devtools, check console for errors, verify network requests'"
      - "kill %1 2>/dev/null || true"
    fallback_discovery:
      - "read package.json scripts for dev command"
      - "read src/app/ or src/pages/ for primary route paths"
  backend-contract:
    layers: [unit_or_integration, runtime]
    tools: [api-contract-tests, integration-tests]
    pass: [contract-holds, integration-pass]
    failure_policy: repair_before_advance
    commands:
      - "${test_command}"
      - "${lint_command}"
      - "${typecheck_command}"
    fallback_discovery:
      - "read package.json scripts for test command"
      - "fallback: npm test"
      - "fallback: pytest (Python)"
      - "fallback: go test ./... (Go)"
  observability:
    layers: [observability]
    tools: [logs, metrics, traces]
    pass: [no-critical-errors, budget-met]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${dev_command} &"
      - "sleep 3 && curl -sf http://localhost:${dev_port}/health || exit 1"
      - "echo 'manual: inspect application logs for errors, check performance metrics'"
      - "kill %1 2>/dev/null || true"
    fallback_discovery:
      - "read wrangler.toml for logpush or analytics bindings"
      - "check for observability SDK in dependencies"
  cloudflare-preview:
    layers: [deployment, runtime, ui]
    tools: [build, cloudflare-preview-deploy, smoke-http-check, browser-smoke]
    pass: [preview-deployed, key-routes-healthy, no-blocking-ui-errors]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${preview_deploy_command}"
      - "sleep 5"
      - "curl -sf ${preview_url}/ || exit 1"
      - "curl -sf ${preview_url}/health || echo 'warn: no /health endpoint'"
    fallback_discovery:
      - "read wrangler.toml for pages project name"
      - "read package.json for build command"
      - "fallback preview deploy: npx wrangler pages deploy dist --branch preview"
  cloudflare-production:
    layers: [deployment, runtime, observability]
    tools: [cloudflare-production-deploy, production-smoke, logs, rollback-check]
    pass: [production-deployed, smoke-pass, no-critical-errors, rollback-ready]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${production_deploy_command}"
      - "sleep 5"
      - "curl -sf ${production_url}/ || exit 1"
      - "curl -sf ${production_url}/health || echo 'warn: no /health endpoint'"
      - "echo 'manual: check Cloudflare dashboard for errors, verify rollback plan'"
    fallback_discovery:
      - "read wrangler.toml for production config"
      - "fallback production deploy: npx wrangler pages deploy dist --branch main"
  provider-preview:
    layers: [deployment, runtime, ui]
    tools: [build, preview-deploy, smoke-http-check, browser-smoke]
    pass: [preview-deployed, key-routes-healthy, no-blocking-ui-errors]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${preview_deploy_command}"
      - "sleep 5"
      - "curl -sf ${preview_url}/ || exit 1"
    fallback_discovery:
      - "read harnass-os/documents/deploy/current.yaml for deploy commands"
      - "read package.json for build command"
  provider-production:
    layers: [deployment, runtime, observability]
    tools: [production-deploy, production-smoke, logs, rollback-check]
    pass: [production-deployed, smoke-pass, no-critical-errors, rollback-ready]
    failure_policy: repair_before_advance
    commands:
      - "${build_command}"
      - "${production_deploy_command}"
      - "sleep 5"
      - "curl -sf ${production_url}/ || exit 1"
    fallback_discovery:
      - "read harnass-os/documents/deploy/current.yaml for production deploy commands"
  milestone-integration:
    layers: [unit_or_integration, runtime, ui]
    tools: [impacted-integration-suite, end-to-end-journey]
    pass: [milestone-whole-behavior-pass]
    failure_policy: repair_before_advance
    commands:
      - "${lint_command}"
      - "${typecheck_command}"
      - "${test_command}"
      - "${build_command}"
      - "${dev_command} &"
      - "sleep 3 && curl -sf http://localhost:${dev_port}/ || exit 1"
      - "kill %1 2>/dev/null || true"
    fallback_discovery:
      - "combine all profile commands for a full integration check"
select:
  ui-planning: [design-review]
  ui: [ui-path]
  frontend-js: [static-js]
  backend-api: [backend-contract]
  runtime-wiring: [runtime-startup]
  perf-or-reliability: [observability]
  cloudflare: [cloudflare-preview, cloudflare-production]
  vercel: [provider-preview, provider-production]
  generic-deploy: [provider-preview, provider-production]

