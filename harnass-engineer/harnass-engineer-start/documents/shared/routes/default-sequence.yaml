id: suite-flow
flow:
  - harnass-engineer-start
  - harnass-engineer-plan
  - implement
  - deploy
  - harnass-engineer-final-audit
enter:
  start: repo lacks the full scaffold
  plan: scaffold exists and intent must be written
  implement: approved reviewed plan exists
  deploy: release-affecting work is ready for preview or production deployment
  final-audit: production deployment is recorded and final signoff is pending
implement_phase_note: |
  The implement phase is not a packaged skill. It is governed by the scaffolded
  repo's own AGENTS.md, CLAUDE.md, Implement.md runbook, and the git hooks
  (pre-commit, commit-msg, pre-push) that enforce agent-guard.py checks.
  The agent follows Implement.md instructions and the target-repo router.yaml
  to execute tasks from the approved plan. Constraint enforcement during
  implementation relies on:
    - agent-guard.py (20 runtime guard commands with exit codes)
    - git hooks (lint, plan-gate, task-sync, commit context, validation, deployment)
    - worktree protocol (write-scope isolation, one task per worktree)
    - commit policy (one task = one commit, validation-complete before commit)
    - handoff protocol (11 required fields, push blocked until handoff exists)
deploy_phase_note: |
  The deploy phase is not a packaged skill. It is governed by the scaffolded
  repo's Deploy.md runbook and deploy/current.yaml. The agent follows deployment
  commands from the plan, records deployment status, and transitions to
  final-audit when production deployment is confirmed.
docking_convention:
  core_paths:
    state: harnass-os/documents/orchestrator/current.yaml
    version: harnass-os/documents/.harnass-version.yaml
    routes: harnass-os/documents/routes/
    plans: harnass-os/documents/plans/
    intake: harnass-os/documents/intake/
    inventory: harnass-os/documents/inventory/
    validation: harnass-os/documents/validation/
  extension_registration:
    new_audit_modules: harnass-os/documents/audit/modules/
    new_intake_queues: harnass-os/documents/intake/
  skill_entry: SKILL.md (docking frontmatter)
