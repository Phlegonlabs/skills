  - root-entrypoints-materialized
  - canonical-runbooks-materialized
  - intake-layer-required
  - re-plan-queue-required
  - route-stack-required
  - design-doc-layer-required
  - state-stack-required
  - runtime-layer-required
  - release-layer-required
  - audit-layer-required
  - decisions-layer-required
  - design-validation-layer-required
  - deployment-layer-required
