id: audit-md
out: Audit.md
sections:
  - audit_gate
  - module_selection
  - smoke_first_rule
  - release_signoff
  - remediation_route
sequence:
  - confirm production deployment is recorded before auditing
  - select adaptive modules from repo shape and deployed surface
  - run smoke checks first where the module requires live-path verification
  - write audit current, history, and findings artifacts
  - block release signoff until blocking findings are cleared
  - route failed audits into a new remediation plan
