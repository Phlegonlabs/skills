id: milestone-tasks-md
path: harnass-os/documents/plans/milestone-tasks.md
purpose: Human-readable milestone and task progress tracker
generated_by: orchestrator projection from the current approved or draft plan
updated_by: orchestrator tick (after plan, task, or change-request writeback)
format: markdown
sections:
  - header: "# Milestone Tasks"
  - meta: "plan_id, plan_status, plan_revision, task_horizon, generated_at, last_updated"
  - per_milestone:
      heading: "## [x| ] <milestone.id> - <milestone.goal>"
      task_table:
        columns: [status_icon, task_id, goal, depends_on, validation_profile]
        status_icons:
          pending: "[ ]"
          in_progress: "[~]"
          committed: "[x]"
          failed: "[!]"
  - footer: "---\nGenerated by harnass-engineer-plan. Updated by harnass-engineer during implementation."
rules:
  - one row per task
  - tracker is regenerated from plan milestones and task statuses, never hand-edited
  - status icon updates follow task status on every orchestrator tick
  - milestone heading gets a checkmark when all tasks committed
  - follow-up milestones append in plan order
  - generated_at stays stable after first generation while last_updated refreshes on every rewrite

