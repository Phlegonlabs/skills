id: agent-guard
entrypoints:
  - classify-intake-horizon
  - seed-execution-state
  - confirm-plan-horizon
  - check-plan-review
  - check-plan-gate
  - record-task-change
  - check-task-sync
  - check-handoff-ready
  - check-execution-ready
  - check-deployment-ready
  - check-final-audit-ready
  - check-final-audit-pass
  - check-release-signoff
  - check-commit-context
  - check-task-fields
  - check-design-sync
  - check-write-scope-overlap
  - check-task-deps
  - check-validation-complete
  - check-waiver-integrity
inputs:
  classify-intake-horizon: harnass-os/documents/intake/request.yaml
  seed-execution-state: harnass-os/documents/runs/current.yaml + harnass-os/documents/status/current.yaml
  confirm-plan-horizon: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-plan-review: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-plan-gate: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml + harnass-os/documents/design/wireframe.md when ui-facing + harnass-os/documents/design/design.md when ui-facing
  record-task-change: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml + changed task ids
  check-task-sync: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml + harnass-os/documents/handoffs/<task-id>.yaml when task committed
  check-handoff-ready: valid task handoff in harnass-os/documents/handoffs/<task-id>.yaml
  check-execution-ready: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml + harnass-os/documents/validation/profiles.yaml + harnass-os/documents/design/wireframe.md when ui-facing + harnass-os/documents/design/design.md when ui-facing
  check-deployment-ready: harnass-os/documents/deploy/current.yaml + harnass-os/documents/release/current.yaml + harnass-os/documents/runtime/cloudflare.yaml + harnass-os/documents/status/current.yaml
  check-final-audit-ready: harnass-os/documents/deploy/current.yaml + harnass-os/documents/release/current.yaml + harnass-os/documents/audit/current.yaml + harnass-os/documents/runtime/<provider>.yaml + harnass-os/documents/status/current.yaml
  check-final-audit-pass: harnass-os/documents/audit/current.yaml
  check-release-signoff: harnass-os/documents/deploy/current.yaml + harnass-os/documents/release/current.yaml + harnass-os/documents/audit/current.yaml + harnass-os/documents/status/current.yaml
  check-commit-context: commit message file path
  check-task-fields: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-design-sync: harnass-os/documents/inventory/current-state.yaml + harnass-os/documents/plans/<slug>.yaml + harnass-os/documents/design/wireframe.md + harnass-os/documents/design/design.md + harnass-os/documents/validation/design-review.yaml
  check-write-scope-overlap: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-task-deps: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-validation-complete: harnass-os/documents/status/current.yaml + harnass-os/documents/plans/<slug>.yaml
  check-waiver-integrity: harnass-os/documents/waivers/active.yaml + harnass-os/documents/status/current.yaml
outputs:
  - initial_horizon
  - run_id
  - task_horizon
  - plan_revision
  - execution_ready
  - deployment_ready
  - final_audit_ready
  - final_audit_passed
  - release_signoff
materialization:
  default_entry: harnass-os/scripts/agent-guard.py
  compatible_wrappers:
    - harnass-os/hooks/pre-commit
    - harnass-os/hooks/commit-msg
    - harnass-os/hooks/pre-push
  exit_codes:
    pass: 0
    blocking_violation: 1
    misconfigured_scaffold: 2
commands:
  classify-intake-horizon:
    purpose: classify the intake into single_task, long_run, or undecided before planning
  seed-execution-state:
    purpose: ensure run and status ledgers exist before long-run work starts
  confirm-plan-horizon:
    purpose: verify the reviewed plan horizon matches the task and milestone shape
  check-plan-review:
    purpose: block execution until self-review is complete and blocking findings are cleared
  check-plan-gate:
    purpose: block commits or pushes when no approved execution-ready plan exists
  record-task-change:
    purpose: record task shape mutations only after the plan revision is updated
  check-task-sync:
    purpose: ensure task status, handoff, and status logs stay synchronized with code changes
  check-handoff-ready:
    purpose: block push or next-task advancement until the current task handoff exists
  check-execution-ready:
    purpose: verify structured plan state, validation profiles, plan approval gates, and design docs before execution
  check-deployment-ready:
    purpose: block deployment until preview validation, runtime docs, release docs, deploy commands, smoke checks, and rollback route are documented
  check-final-audit-ready:
    purpose: block the final-audit route until production deployment, runtime docs, release docs, and audit scaffolding are in place
  check-final-audit-pass:
    purpose: verify final audit artifacts are fully populated, all applicable module smoke checks and deep audit checks passed, and no blocking findings remain
  check-release-signoff:
    purpose: block release closeout until the release document points at a passed final audit and records complete signoff
  check-commit-context:
    purpose: require task or plan revision context in commit messages
  check-task-fields:
    purpose: verify every task in the approved plan has all required fields populated and conditional fields when applicable
  check-design-sync:
    purpose: verify UI-facing plans have design docs, design review, and task-level design refs in sync
  check-write-scope-overlap:
    purpose: detect overlapping write_scope values between active tasks to prevent parallel conflict
  check-task-deps:
    purpose: verify task dependency graph has no cycles and all depends_on references exist
  check-validation-complete:
    purpose: verify validated or committed tasks have non-placeholder validation_commands
  check-waiver-integrity:
    purpose: validate all active waivers have required fields, non-expired status, and matching plan revision
gates:
  - no-execution-without-approved-plan
  - no-task-shape-change-without-plan-revision
  - no-commit-without-commit-context
  - no-production-without-preview-validation
  - no-release-signoff-without-final-audit-pass
  - no-push-without-handoff
  - no-task-without-required-fields
  - no-ui-plan-without-design-sync
  - no-overlapping-write-scopes
  - no-circular-task-dependencies
  - no-commit-without-validation-complete
  - waiver-integrity-verified
  - no-waiver-for-final-audit

