id: orchestrator-state
out: harnass-os/documents/orchestrator/current.yaml
required:
  - state
  - previous_stable_state
  - registered_phases
  - active_plan_id
  - active_plan_revision
  - release_affecting
  - current_task_id
  - current_audit_module
  - completed_audit_modules
  - pending_events
  - observed_changes
  - sync_lane
  - sync_status
  - affected_task_ids
  - pending_change_request_ids
  - pending_replan_request_ids
  - pending_triage_request_ids
  - last_plan_sync_at
  - last_transition
  - last_error
  - updated_at
states:
  - IDLE
  - STARTING
  - READY_FOR_PLAN
  - PLANNING
  - PLAN_REVIEW
  - IMPLEMENTING
  - DEPLOYING
  - FINAL_AUDITING
  - COMPLETE
  - BLOCKED
sync_lane: [none, inferred_drift, user_change_request, re_plan_request, manual_triage]
sync_status: [clean, needs_review, applying_followup, needs_replan, needs_human_triage]
notes:
  - state is the orchestrator's current lifecycle phase
  - previous_stable_state stores the latest non-BLOCKED phase
  - pending_events stores the events observed on the latest tick
  - observed_changes stores tracked repo surfaces that may require re-planning
  - sync_lane records whether the latest automated writeback came from inferred drift, a follow-up request, a re-plan request, or manual triage
  - sync_status distinguishes clean execution from re-review, follow-up application, re-plan blocking, and manual triage states
  - affected_task_ids stores the task IDs most impacted by the latest plan sync
  - pending_change_request_ids stores durable user requests that still need to be applied
  - pending_replan_request_ids stores structural user requests that still need manual approval or re-plan routing
  - pending_triage_request_ids stores ambiguous change requests waiting for human triage
  - last_plan_sync_at stores the UTC timestamp of the latest automatic plan/tracker writeback
  - current_audit_module points at the next audit module to execute when final audit is in progress
