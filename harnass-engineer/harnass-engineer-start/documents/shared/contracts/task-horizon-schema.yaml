id: task-horizon
values: [single_task, long_run]
intake_rules:
  single_task:
    - one focused user ask
    - narrow write surface
    - one milestone expected
  long_run:
    - greenfield product request
    - multi-surface change
    - open-ended delivery
    - multi-milestone expected
plan_rules:
  single_task:
    - milestones == 1
    - tasks <= 3
  long_run:
    - milestones > 1 or tasks > 3
question_depth:
  single_task:
    min_rounds: 1
    max_rounds: 3
    strategy: minimum-unblocking-set-only
  long_run:
    min_rounds: 3
    max_rounds: 10
    strategy: fixed-intake-then-deep-dive
    fixed_rounds: 3
    deep_dive_rounds: 7
gates:
  - intake-classification-required
  - reviewed-plan-confirmation-required
  - upgrade-allowed-on-plan-review
